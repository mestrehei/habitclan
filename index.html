// BOTTOM SHEET — componente reutilizável para todos os modais
// Mobile: painel que sobe de baixo, tela quase cheia
// Desktop: modal centralizado clássico
// ============================================================
function BottomSheet({ onClose, title, accentColor, onSave, saveLabel, saveDisabled, children, noPadding }) {
  const sheetRef = React.useRef(null);
  const startY = React.useRef(null);
  const currentY = React.useRef(0);

  // Swipe down para fechar (mobile)
  const handleTouchStart = (e) => {
    startY.current = e.touches[0].clientY;
  };
  const handleTouchMove = (e) => {
    const delta = e.touches[0].clientY - startY.current;
    if (delta > 0 && sheetRef.current) {
      currentY.current = delta;
      sheetRef.current.style.transform = `translateY(${delta}px)`;
      sheetRef.current.style.transition = 'none';
    }
  };
  const handleTouchEnd = () => {
    if (sheetRef.current) {
      sheetRef.current.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
      if (currentY.current > 120) {
        sheetRef.current.style.transform = 'translateY(100%)';
        setTimeout(onClose, 280);
      } else {
        sheetRef.current.style.transform = 'translateY(0)';
      }
      currentY.current = 0;
    }
  };

  const color = accentColor || '#FF3D9A';

  return (
    <div
      className="sheet-bg fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex flex-col justify-end sm:justify-center sm:items-center sm:p-4"
      onClick={onClose}
    >
      {/* SHEET PANEL */}
      <div
        ref={sheetRef}

          background: 'linear-gradient(170deg, #16082a 0%, #0A0612 100%)',
          borderTop: `2px solid ${color}`,
          borderLeft: '1px solid rgba(255,255,255,0.08)',
          borderRight: '1px solid rgba(255,255,255,0.08)',
          borderBottom: '1px solid rgba(255,255,255,0.08)',

          <button
            onClick={onClose}
            className="text-white/60 hover:text-white font-semibold text-sm sm:text-base px-1 py-1 -ml-1 active:opacity-60 transition-opacity"

          </button>

            style={{ color }}>
            {title}

          {/* Salvar / ação principal */}
          {onSave ? (
            <button
              onClick={onSave}
              disabled={saveDisabled}
              className="font-bold text-sm sm:text-base px-3 py-1.5 rounded-xl transition-all active:scale-95 disabled:opacity-30"
              style={{
                background: saveDisabled ? 'rgba(255,255,255,0.1)' : color,
                color: saveDisabled ? 'rgba(255,255,255,0.4)' : 'black',

                textAlign: 'center',

}

// ============== MODAL: TAREFA ==============
function TaskModal({ task, players, onClose, onSave }) {
  const isEdit = !!task;
  const [name, setName] = useState(task?.name || '');
  const [category, setCategory] = useState(task?.category || 'study');
  const [frequency, setFrequency] = useState(task?.frequency || 'daily');
  const [goal, setGoal] = useState(task?.goal || 1);
  const [points, setPoints] = useState(task?.points || 10);
  const [assignMode, setAssignMode] = useState(task && task.assignedTo !== 'all' && Array.isArray(task.assignedTo) ? 'specific' : 'all');
  const [assignedIds, setAssignedIds] = useState(task && Array.isArray(task.assignedTo) ? task.assignedTo : players.map(p => p.id));
  const [individualGoals, setIndividualGoals] = useState(task && task.perPlayerGoals && Object.keys(task.perPlayerGoals).length > 0);
  const [perPlayerGoals, setPerPlayerGoals] = useState(task?.perPlayerGoals || {});
  const [perPlayerPoints, setPerPlayerPoints] = useState(task?.perPlayerPoints || {});
  const [taskEmoji, setTaskEmoji] = useState(task?.emoji || '');
  const [emojiGroup, setEmojiGroup] = useState(Object.keys(TASK_EMOJIS)[0]);

  const toggleAssigned = (id) => {
    setAssignedIds(assignedIds.includes(id) ? assignedIds.filter(i => i !== id) : [...assignedIds, id]);
  };

  const targetPlayers = assignMode === 'all' ? players : players.filter(p => assignedIds.includes(p.id));

  const submit = () => {
    if (!name.trim()) return;
    if (assignMode === 'specific' && assignedIds.length === 0) {
      alert('Selecione pelo menos uma pessoa.');
      return;
    }
    let finalPerPlayerGoals = {};
    let finalPerPlayerPoints = {};
    if (individualGoals) {
      targetPlayers.forEach(p => {
        finalPerPlayerGoals[p.id] = Math.max(1, Number(perPlayerGoals[p.id]) || Number(goal) || 1);
        finalPerPlayerPoints[p.id] = Math.max(1, Number(perPlayerPoints[p.id]) || Number(points) || 1);
      });
    }
    onSave({
      id: task?.id,
      name: name.trim(),
      emoji: taskEmoji || null,
      category, frequency,
      goal: Math.max(1, Number(goal) || 1),
      points: Math.max(1, Number(points) || 1),
      assignedTo: assignMode === 'all' ? 'all' : assignedIds,
      perPlayerGoals: finalPerPlayerGoals,
      perPlayerPoints: finalPerPlayerPoints,
    });
  };

  return (
    <BottomSheet
      onClose={onClose}
      title={isEdit ? 'EDITAR TAREFA' : 'NOVA TAREFA'}
      accentColor="#FF3D9A"
      onSave={submit}
      saveLabel={isEdit ? 'Salvar' : 'Criar'}
      saveDisabled={!name.trim()}
    >
      <div className="space-y-4">
          {/* Preview do emoji + nome */}
          <div className="flex items-center gap-3 bg-white/5 rounded-2xl p-3 border border-white/10">
            <div className="text-4xl flex-shrink-0"
              style={{ filter: taskEmoji ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'none' }}>
              {taskEmoji || (CATEGORIES.find(c => c.id === category)?.icon || '⭐')}
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-white font-bold text-sm truncate">{name || 'Nome da tarefa'}</div>
              <div className="text-[10px] text-white/40 mt-0.5">
                {taskEmoji ? 'Emoji personalizado' : 'Usando ícone da categoria'}
                {taskEmoji && (
                  <button onClick={() => setTaskEmoji('')} className="ml-2 text-red-400 hover:text-red-300 underline">
                    remover
                  </button>
                )}
              </div>
            </div>
          </div>

          <Field label="Nome da tarefa">
            <input type="text" value={name} onChange={e => setName(e.target.value)}
              placeholder="Ex: Escovar os dentes"
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-pink-500 transition-colors"
              autoFocus />
          </Field>

          <Field label="Categoria">
            <div className="grid grid-cols-3 gap-2">
              {CATEGORIES.map(c => (
                <button key={c.id} onClick={() => setCategory(c.id)}
                  className={`p-2 sm:p-3 rounded-xl border-2 transition-all ${category === c.id ? 'scale-105' : 'border-white/10'}`}
                  style={category === c.id ? { borderColor: c.color, background: c.color + '20' } : {}}>
                  <div className="text-xl sm:text-2xl">{c.icon}</div>
                  <div className="text-[10px] sm:text-xs text-white/70 mt-1">{c.name}</div>
                </button>
              ))}
            </div>
          </Field>

          <Field label="Emoji da tarefa (opcional)">
            {/* Seletor de grupo */}
            <div className="flex gap-1.5 overflow-x-auto scrollbar-custom pb-1 mb-2">
              {Object.keys(TASK_EMOJIS).map(group => (
                <button key={group} onClick={() => setEmojiGroup(group)}
                  className={`px-2.5 py-1 rounded-lg font-bold text-[10px] whitespace-nowrap flex-shrink-0 transition-all ${emojiGroup === group ? 'bg-pink-500 text-white' : 'bg-white/5 text-white/50 hover:bg-white/10'}`}>
                  {group.split(' ')[0]}
                </button>
              ))}
            </div>
            {/* Grid de emojis */}
            <div className="bg-black/40 rounded-xl p-2 max-h-32 overflow-y-auto scrollbar-custom">
              <div className="grid grid-cols-10 sm:grid-cols-12 gap-1">
                {TASK_EMOJIS[emojiGroup]?.map(em => (
                  <button key={em} onClick={() => setTaskEmoji(taskEmoji === em ? '' : em)}
                    className={`text-xl p-1.5 rounded-lg transition-all hover:scale-110 ${taskEmoji === em ? 'bg-pink-500/30 ring-2 ring-pink-400 scale-110' : 'hover:bg-white/10'}`}>
                    {em}
                  </button>
                ))}
              </div>
            </div>
          </Field>

          <Field label="Para quem">
            <div className="flex gap-2 mb-3">
              <button onClick={() => setAssignMode('all')}
                className={`flex-1 py-2 rounded-xl font-bold text-xs sm:text-sm transition-all ${assignMode === 'all' ? 'bg-cyan-400 text-black' : 'bg-black/40 text-white/60 border border-white/10'}`}>
                TODOS
              </button>
              <button onClick={() => setAssignMode('specific')}
                className={`flex-1 py-2 rounded-xl font-bold text-xs sm:text-sm transition-all ${assignMode === 'specific' ? 'bg-cyan-400 text-black' : 'bg-black/40 text-white/60 border border-white/10'}`}>
                ESPECÍFICOS
              </button>
            </div>
            {assignMode === 'specific' && (
              <div className="grid grid-cols-2 gap-2">
                {players.map(p => {
                  const selected = assignedIds.includes(p.id);
                  return (
                    <button key={p.id} onClick={() => toggleAssigned(p.id)}
                      className={`p-2 sm:p-3 rounded-xl border-2 flex items-center gap-2 transition-all ${selected ? '' : 'border-white/10 opacity-50'}`}
                      style={selected ? { borderColor: p.color, background: p.color + '20' } : {}}>
                      <span className="text-xl sm:text-2xl">{p.emoji}</span>
                      <span className="text-white text-xs sm:text-sm font-bold truncate">{p.name}</span>
                      {selected && <Check size={14} className="text-green-400 ml-auto flex-shrink-0" strokeWidth={3} />}
                    </button>
                  );
                })}
              </div>
            )}
          </Field>

          <Field label="Frequencia">
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {FREQUENCIES.map(f => (
                <button key={f.id} onClick={() => setFrequency(f.id)}
                  className={`p-2 sm:p-3 rounded-xl border-2 font-bold transition-all text-xs ${frequency === f.id ? 'border-yellow-400 bg-yellow-400/10 text-yellow-300' : 'border-white/10 text-white/60'}`}>
                  {f.name}
                </button>
              ))}
            </div>
          </Field>

          <div className="bg-cyan-500/5 border border-cyan-500/20 rounded-xl p-3">
            <label className="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" checked={individualGoals} onChange={e => setIndividualGoals(e.target.checked)}
                className="w-5 h-5 rounded accent-cyan-400" />
              <div className="flex-1">
                <div className="text-sm font-bold text-cyan-300">Metas individuais por pessoa</div>
                <div className="text-[10px] text-white/50">Defina quantidade e pontos diferentes para cada um</div>
              </div>
            </label>
          </div>

          {!individualGoals ? (
            <div className="grid grid-cols-2 gap-3">
              <Field label={`Meta (${FREQUENCIES.find(f => f.id === frequency)?.label})`}>
                <input type="number" min="1" value={goal}
                  onChange={e => setGoal(e.target.value === '' ? '' : e.target.value)}
                  onBlur={e => { if (!e.target.value || Number(e.target.value) < 1) setGoal(1); }}
                  className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400" />
              </Field>
              <Field label="Pontos por vez">
                <input type="number" min="1" value={points}
                  onChange={e => setPoints(e.target.value === '' ? '' : e.target.value)}
                  onBlur={e => { if (!e.target.value || Number(e.target.value) < 1) setPoints(1); }}
                  className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-cyan-400" />
              </Field>
            </div>
          ) : (
            <Field label="Por pessoa (meta + pontos)">
              <div className="space-y-2 bg-black/30 p-3 rounded-xl">
                {targetPlayers.map(p => (
                  <div key={p.id} className="flex items-center gap-2">
                    <span className="text-2xl flex-shrink-0">{p.emoji}</span>
                    <span className="text-sm text-white font-bold truncate w-16 sm:w-20">{p.name}</span>
                    <div className="flex-1 grid grid-cols-2 gap-2">
                      <div>
                        <input type="number" min="1"
                          value={perPlayerGoals[p.id] ?? goal}
                          onChange={e => setPerPlayerGoals({ ...perPlayerGoals, [p.id]: e.target.value === '' ? '' : e.target.value })} onBlur={e => { if (!e.target.value || Number(e.target.value) < 1) setPerPlayerGoals({ ...perPlayerGoals, [p.id]: 1 }); }}
                          placeholder="Meta"
                          className="w-full bg-black/50 border-2 border-white/10 rounded-lg px-2 py-1.5 text-white text-sm focus:border-cyan-400" />
                        <div className="text-[9px] text-white/40 text-center mt-0.5">meta</div>
                      </div>
                      <div>
                        <input type="number" min="1"
                          value={perPlayerPoints[p.id] ?? points}
                          onChange={e => setPerPlayerPoints({ ...perPlayerPoints, [p.id]: e.target.value === '' ? '' : e.target.value })} onBlur={e => { if (!e.target.value || Number(e.target.value) < 1) setPerPlayerPoints({ ...perPlayerPoints, [p.id]: 1 }); }}
                          placeholder="Pts"
                          className="w-full bg-black/50 border-2 border-white/10 rounded-lg px-2 py-1.5 text-white text-sm focus:border-cyan-400" />
                        <div className="text-[9px] text-white/40 text-center mt-0.5">pontos</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <p className="text-[10px] text-white/40 mt-2 italic">Ex: Filha 1 com meta 2x e 5 pts, Papai com meta 1x e 20 pts</p>
            </Field>
          )}

          <button onClick={submit} disabled={!name.trim()}
            className="w-full py-3 sm:py-4 rounded-xl font-bold text-black bungee text-base sm:text-lg disabled:opacity-40"
            style={{ background: 'linear-gradient(135deg, #FFD600, #FF3D9A)', boxShadow: '0 0 20px rgba(255,61,154,0.4)' }}>
            {isEdit ? 'Salvar' : 'Criar Tarefa'}
          </button>
        </div>
    </BottomSheet>
  );
}

    <div>
      <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">{label}</label>

// ============== MODAL: PRÊMIO ==============
function RewardModal({ reward, onClose, onSave }) {
  const isEdit = !!reward;
  const [name, setName] = useState(reward?.name || '');
  const [description, setDescription] = useState(reward?.description || '');
  const [icon, setIcon] = useState(reward?.icon || '🎁');
  const [position, setPosition] = useState(reward?.position || 1);
  const [targetMonth, setTargetMonth] = useState(reward?.monthKey || monthKey());

  const REWARD_ICONS = ['🎁', '🏆', '🥇', '🎮', '🍕', '🍦', '🎬', '🎢', '🛍️', '💰', '👑', '⭐', '🎂', '🍫', '📱', '🚲', '🎨', '🎸', '⚽', '🎯'];

  const submit = () => {
    if (!name.trim()) return;
    onSave({
      id: reward?.id,
      name: name.trim(),
      description: description.trim(),
      icon,
      position: Math.max(1, position),
      monthKey: targetMonth,
      awarded: reward?.awarded || false,
      awardedTo: reward?.awardedTo || null,
      awardedAt: reward?.awardedAt || null,
    });
  };

  const monthOptions = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date();
    d.setMonth(d.getMonth() + i);
    monthOptions.push({
      key: monthKey(d),
      label: d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase(),
    });
  }

  return (
    <BottomSheet
      onClose={onClose}
      title={isEdit ? 'EDITAR PRÊMIO' : 'NOVO PRÊMIO'}
      accentColor="#FFD600"
      onSave={submit}
      saveLabel={isEdit ? 'Salvar' : 'Criar'}
      saveDisabled={!name.trim()}
    >
      <div className="space-y-4">
          <div className="text-center">
            <div className="text-6xl sm:text-7xl mb-2">{icon}</div>
          </div>

          <Field label="Nome do prêmio">
            <input type="text" value={name} onChange={e => setName(e.target.value)}
              placeholder="Ex: Sorvete grande"
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-yellow-400"
              autoFocus />
          </Field>

          <Field label="Descrição (opcional)">
            <input type="text" value={description} onChange={e => setDescription(e.target.value)}
              placeholder="Ex: Pode escolher qualquer sabor"
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-yellow-400" />
          </Field>

          <Field label="Ícone">
            <div className="grid grid-cols-6 sm:grid-cols-10 gap-2 bg-black/30 p-3 rounded-xl">
              {REWARD_ICONS.map(i => (
                <button key={i} onClick={() => setIcon(i)}
                  className={`text-xl sm:text-2xl p-2 rounded-lg transition-all ${icon === i ? 'bg-yellow-400/20 scale-110 ring-2 ring-yellow-400' : 'hover:bg-white/5'}`}>
                  {i}
                </button>
              ))}
            </div>
          </Field>

          <Field label="Posição no ranking">
            <div className="grid grid-cols-5 gap-2">
              {[1, 2, 3, 4, 5].map(p => (
                <button key={p} onClick={() => setPosition(p)}
                  className={`p-3 rounded-xl border-2 font-bold transition-all ${position === p ? 'border-yellow-400 bg-yellow-400/20 text-yellow-300' : 'border-white/10 text-white/60'}`}>
                  {p}º
                </button>
              ))}
            </div>
            <p className="text-[10px] text-white/40 mt-2 italic">Ganha quem terminar o mês nessa posição</p>
          </Field>

          <Field label="Mês de competição">
            <select value={targetMonth} onChange={e => setTargetMonth(e.target.value)}
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-yellow-400">
              {monthOptions.map(m => (
                <option key={m.key} value={m.key} className="bg-[#1a0a2e]">{m.label}</option>
              ))}
            </select>
          </Field>

          <button onClick={submit} disabled={!name.trim()}
            className="w-full py-3 sm:py-4 rounded-xl font-bold text-black bungee text-base sm:text-lg disabled:opacity-40"
            style={{ background: 'linear-gradient(135deg, #FFD600, #FF3D9A)', boxShadow: '0 0 20px rgba(255,214,0,0.4)' }}>
            {isEdit ? 'Salvar' : 'Criar Prêmio'}
          </button>
        </div>
    </BottomSheet>
  );
}

const CURRENCY = 'R$';
const fmt = (v) => `${CURRENCY} ${Number(v || 0).toFixed(2).replace('.', ',')}`;

// Meses para o histórico (12 meses atrás até hoje)
function getMonthRange() {
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() - i);
    months.push({
      key: monthKey(d),
      label: d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }),
      labelShort: d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }),
    });
  }
  return months;
}

    .filter(p => p.playerId === historyPlayer && p.status === 'paid')

  const totalBonus = allowancePayments
    .filter(p => p.playerId === historyPlayer && p.status === 'paid')
    .reduce((s, p) => s + (p.bonusPaid || 0), 0);

  if (configuredPlayers.length === 0) {
    return (
      <div className="text-center py-14">

            className={`flex items-center gap-2 px-3 py-2 rounded-xl font-bold text-xs sm:text-sm transition-all flex-shrink-0 ${historyPlayer === p.id ? 'text-black' : 'bg-black/40 border border-white/10 text-white/60'}`}
            style={historyPlayer === p.id ? { background: p.color, boxShadow: `0 0 15px ${p.color}80` } : {}}>
            <span className="text-lg">{p.emoji}</span>
            <span>{p.name}</span>
          </button>
        ))}

      {/* Stats acumulados */}
      {player && historyPlayer && (
        <div className="grid grid-cols-3 gap-2 sm:gap-3">

            <div className="text-[9px] sm:text-[10px] text-white/50 uppercase tracking-widest mb-1">Total recebido</div>
            <div className="bungee text-base sm:text-xl" style={{ color: player.color }}>{fmt(totalEarned)}</div>

          <div className="bg-black/50 border border-white/10 rounded-2xl p-3 sm:p-4 text-center">

        <div className="space-y-2">

                  <div className="mt-2 text-xs text-white/50 bg-white/5 rounded-lg px-3 py-1.5 italic">
                    {payment.note}
                    {isPaid && <span className="text-white/30 ml-2">· {new Date(payment.paidAt).toLocaleDateString('pt-BR')}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ============== MODAL: AÇÕES DA TAREFA ==============
// Abre quando clica em tarefa já marcada OU segura qualquer tarefa
// Cenário 1: marcar em dia passado
// Cenário 2: desmarcar (desfazer) do dia atual ou passado
// Cenário 3: limite diário garantido pelo getGoalForPlayer
function TaskActionModal({ taskId, playerId, tasks, players, completions, getGoalForPlayer, onClose, onCompleteForDate, onUncomplete }) {
  const task = tasks.find(t => t.id === taskId);
  const player = players.find(p => p.id === playerId);
  const cat = task ? (CATEGORIES.find(c => c.id === task.category) || CATEGORIES[5]) : CATEGORIES[5];
  const goal = task ? getGoalForPlayer(task, playerId) : 1;

  // Últimos 7 dias
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const label = i === 0 ? 'Hoje' : i === 1 ? 'Ontem' : d.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
    const doneCount = completions.filter(c =>
      c.taskId === taskId && c.playerId === playerId && c.date === dateStr
    ).length;
    const isComplete = doneCount >= goal;
    const isFuture = false;

    // Verificar se o dia é válido para a frequência da tarefa
    const dayOfWeek = d.getDay(); // 0=dom
    let validForFreq = true;
    if (task?.frequency === 'weekdays') validForFreq = dayOfWeek >= 1 && dayOfWeek <= 5;
    if (task?.frequency === 'weekend') validForFreq = dayOfWeek === 0 || dayOfWeek === 6;

    days.push({ dateStr, label, doneCount, isComplete, validForFreq, isToday: i === 0 });
  }

  if (!task || !player) return null;

  return (
    <div className="sheet-bg fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/75 backdrop-blur-sm"
      onClick={onClose}>
      <div
        className="sheet-enter w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-5 pb-8 sm:pb-5"
        style={{ background: '#0f0a1e', border: '2px solid', borderColor: player.color + '80', boxShadow: `0 0 50px ${player.color}40`, maxHeight: '90vh', overflowY: 'auto' }}
        onClick={e => e.stopPropagation()}>

        {/* Handle mobile */}
        <div className="flex justify-center -mt-1 mb-3 sm:hidden">
          <div className="w-10 h-1 rounded-full bg-white/20" />
        </div>

        {/* Header */}
        <div className="flex items-center gap-3 mb-5">
          <div className="text-4xl" style={{ filter: `drop-shadow(0 0 10px ${cat.color})` }}>{getTaskIcon(task)}</div>
          <div className="flex-1 min-w-0">
            <div className="bungee text-base text-white truncate">{task.name}</div>
            <div className="flex items-center gap-2 mt-0.5">
              <span className="text-lg" style={{ filter: `drop-shadow(0 0 6px ${player.color})` }}>{player.emoji}</span>
              <span className="text-xs text-white/60">{player.name}</span>
              <span className="text-xs text-white/40">· meta {goal}x</span>
            </div>
          </div>
          <button onClick={onClose} className="text-white/40 hover:text-white p-1 flex-shrink-0">
            <X size={20} />
          </button>
        </div>

        {/* Instrução */}
        <div className="text-[10px] uppercase tracking-widest text-white/40 font-bold mb-3">
          Selecione o dia para marcar ou desmarcar
        </div>

        {/* Lista de dias */}
        <div className="space-y-2">
          {days.map(day => {
            if (!day.validForFreq) return null;
            return (
              <div
                key={day.dateStr}
                className="flex items-center gap-3 p-3 rounded-2xl border"
                style={{
                  background: day.isComplete ? `${player.color}15` : 'rgba(255,255,255,0.03)',
                  borderColor: day.isComplete ? player.color + '60' : 'rgba(255,255,255,0.08)',
                }}
              >
                {/* Info do dia */}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className={`text-sm font-bold ${day.isToday ? 'text-yellow-300' : 'text-white/80'}`}>
                      {day.label}
                    </span>
                    {day.isToday && (
                      <span className="text-[10px] bg-yellow-400/20 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">HOJE</span>
                    )}
                  </div>
                  <div className="text-[10px] text-white/40 mt-0.5">
                    {day.doneCount}/{goal} {day.isComplete ? '· completa' : '· incompleta'}
                  </div>
                </div>

                {/* Marcadores de progresso */}
                <div className="flex gap-1 items-center">
                  {Array.from({ length: goal }).map((_, i) => (
                    <div
                      key={i}
                      className="w-5 h-5 rounded-full border-2 flex items-center justify-center"
                      style={{
                        background: i < day.doneCount ? player.color : 'transparent',
                        borderColor: i < day.doneCount ? player.color : 'rgba(255,255,255,0.2)',
                      }}
                    >
                      {i < day.doneCount && <Check size={10} className="text-black" strokeWidth={3} />}
                    </div>
                  ))}
                </div>

                {/* Ações */}
                <div className="flex gap-1.5 flex-shrink-0">
                  {/* Marcar (se não completa) */}
                  {!day.isComplete && (
                    <button
                      onClick={() => { onCompleteForDate(taskId, playerId, day.dateStr); }}
                      className="flex items-center gap-1 px-3 py-1.5 rounded-xl font-bold text-xs text-black transition-all hover:scale-105"
                      style={{ background: player.color, boxShadow: `0 0 12px ${player.color}60` }}>
                      <Check size={12} strokeWidth={3} />
                      Marcar
                    </button>
                  )}
                  {/* Desmarcar (se tem pelo menos 1 marcação) */}
                  {day.doneCount > 0 && (
                    <button
                      onClick={() => { onUncomplete(taskId, playerId, day.dateStr); }}
                      className="flex items-center gap-1 px-3 py-1.5 rounded-xl font-bold text-xs text-red-300 bg-red-500/10 border border-red-500/30 transition-all hover:scale-105">
                      <X size={12} />
                      Desfazer
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <p className="text-[10px] text-white/30 text-center mt-4 italic">
          Toque fora para fechar
        </p>
      </div>
    </div>
  );
}

// ============== MODAL: CONFIGURAR MESADA ==============
function AllowanceConfigModal({ playerId, player, config, onClose, onSave }) {
  const [baseAmount, setBaseAmount] = useState(config?.baseAmount || '');
  const [tiers, setTiers] = useState(
    config?.bonusTiers?.length ? config.bonusTiers : [{ minPoints: 300, pct: 20 }, { minPoints: 600, pct: 40 }]
  );

  const addTier = () => setTiers([...tiers, { minPoints: 0, pct: 10 }]);
  const removeTier = (i) => setTiers(tiers.filter((_, idx) => idx !== i));
  const updateTier = (i, field, value) => {
    const updated = [...tiers];
    updated[i] = { ...updated[i], [field]: Number(value) };
    setTiers(updated);
  };

  const preview = (pts) => {
    const base = Number(baseAmount) || 0;
    let pct = 0;
    tiers.forEach(t => { if (pts >= t.minPoints) pct = Math.max(pct, t.pct); });
    const bonus = Math.round(base * pct / 100);
    return { bonus, total: base + bonus, pct };
  };

  const submit = () => {
    if (!baseAmount || Number(baseAmount) <= 0) { alert('Defina um valor base para a mesada.'); return; }
    onSave({
      baseAmount: Number(baseAmount),
      bonusTiers: tiers.filter(t => t.minPoints > 0 && t.pct > 0).sort((a, b) => a.minPoints - b.minPoints),
    });
  };

  const title = `${player?.emoji || ''} MESADA — ${player?.name || ''}`;
  return (
    <BottomSheet
      onClose={onClose}
      title={title}
      accentColor="#76FF03"
      onSave={submit}
      saveLabel="Salvar"
      saveDisabled={!baseAmount || Number(baseAmount) <= 0}
    >
      <div className="space-y-5">
          <div>
            <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">Valor base mensal (R$)</label>
            <input type="number" min="0" step="0.01" value={baseAmount}
              onChange={e => setBaseAmount(e.target.value)}
              placeholder="Ex: 50.00"
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-400 text-lg font-bold"
              autoFocus />
          </div>

          <div>
            <div className="flex items-center justify-between mb-2">
              <label className="text-[10px] sm:text-xs uppercase tracking-widest text-white/60 font-bold">Metas de bônus (por pontos)</label>
              <button onClick={addTier} className="text-green-400 hover:text-green-300 flex items-center gap-1 text-xs font-bold">
                <Plus size={14} />Adicionar
              </button>
            </div>
            <div className="space-y-2">
              {tiers.map((tier, i) => (
                <div key={i} className="flex items-center gap-2 bg-black/30 rounded-xl p-3">
                  <div className="flex-1 grid grid-cols-2 gap-2">
                    <div>
                      <div className="text-[9px] text-white/40 uppercase mb-1">Mín. pontos</div>
                      <input type="number" min="0" value={tier.minPoints}
                        onChange={e => updateTier(i, 'minPoints', e.target.value)}
                        className="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-green-400" />
                    </div>
                    <div>
                      <div className="text-[9px] text-white/40 uppercase mb-1">Bônus (%)</div>
                      <input type="number" min="0" max="200" value={tier.pct}
                        onChange={e => updateTier(i, 'pct', e.target.value)}
                        className="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-green-400" />
                    </div>
                  </div>
                  <button onClick={() => removeTier(i)} className="text-red-400/60 hover:text-red-400 p-1">
                    <X size={16} />
                  </button>
                </div>
              ))}
              {tiers.length === 0 && (
                <div className="text-white/30 italic text-xs text-center py-3">Sem metas de bônus — mesada fixa.</div>
              )}
            </div>
          </div>

          {/* Preview */}
          {Number(baseAmount) > 0 && (
            <div className="bg-black/40 border border-green-500/20 rounded-2xl p-4">
              <div className="text-[10px] uppercase tracking-widest text-white/50 mb-3 font-bold">Preview de cenários</div>
              <div className="space-y-2">
                {[0, ...[...tiers].sort((a, b) => a.minPoints - b.minPoints).map(t => t.minPoints)].map(pts => {
                  const { bonus, total, pct } = preview(pts);
                  return (
                    <div key={pts} className="flex items-center justify-between text-sm">
                      <span className="text-white/60">{pts} pontos</span>
                      <div className="flex items-center gap-3">
                        {bonus > 0 && <span className="text-green-300 text-xs">+{fmt(bonus)} ({pct}%)</span>}
                        <span className="bungee text-white">{fmt(total)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <button onClick={submit}
            className="w-full py-3 sm:py-4 rounded-xl font-bold text-black bungee text-base sm:text-lg"
            style={{ background: 'linear-gradient(135deg, #76FF03, #00E5FF)', boxShadow: '0 0 20px rgba(118,255,3,0.4)' }}>
            Salvar Configuração
          </button>
        </div>
    </BottomSheet>
  );
}

// ============== MODAL: REGISTRAR PAGAMENTO ==============
function PaymentModal({ data, player, existingPayment, calcTotal, calcBonus, getAllowanceConfig, onClose, onSave }) {
  const { playerId, monthKey: mKey } = data;
  const config = getAllowanceConfig(playerId);
  const baseAmount = config?.baseAmount || 0;
  const bonus = calcBonus(playerId, mKey);
  const suggested = calcTotal(playerId, mKey);

  const [status, setStatus] = useState(existingPayment?.status || 'paid');
  const [totalPaid, setTotalPaid] = useState(existingPayment?.totalPaid ?? suggested);
  const [note, setNote] = useState(existingPayment?.note || '');
  const [paidAt, setPaidAt] = useState(
    existingPayment?.paidAt
      ? new Date(existingPayment.paidAt).toISOString().split('T')[0]
      : new Date().toISOString().split('T')[0]
  );

  const monthLabel = (() => {
    const [y, m] = mKey.split('-');
    return new Date(parseInt(y), parseInt(m) - 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  })();

  const submit = () => {
    onSave({
      id: existingPayment?.id,
      playerId,
      monthKey: mKey,
      basePaid: baseAmount,
      bonusPaid: bonus,
      totalPaid: Number(totalPaid),
      status,
      note: note.trim(),
      paidAt: status === 'paid' ? new Date(paidAt).getTime() : null,
    });
  };

  const payTitle = `${player?.emoji || ''} ${player?.name || ''} — PAGAMENTO`;
  return (
    <BottomSheet
      onClose={onClose}
      title={payTitle}
      accentColor={player?.color || '#76FF03'}
      onSave={submit}
      saveLabel={existingPayment ? 'Atualizar' : 'Salvar'}
    >
      <div className="space-y-4">
        <p className="text-xs text-white/50 capitalize text-center -mt-1 mb-1">{monthLabel}</p>
          {/* Resumo calculado */}
          <div className="bg-black/40 border border-white/10 rounded-xl p-3 sm:p-4">
            <div className="flex items-center justify-between text-sm mb-2">
              <span className="text-white/60">Mesada base</span>
              <span className="text-white font-bold">{fmt(baseAmount)}</span>
            </div>
            {bonus > 0 && (
              <div className="flex items-center justify-between text-sm mb-2">
                <span className="text-white/60">Bônus por pontos</span>
                <span className="text-green-300 font-bold">+{fmt(bonus)}</span>
              </div>
            )}
            <div className="h-px bg-white/10 my-2" />
            <div className="flex items-center justify-between">
              <span className="font-bold text-white">Sugerido</span>
              <span className="bungee text-xl" style={{ color: player?.color }}>{fmt(suggested)}</span>
            </div>
          </div>

          <div>
            <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">Status</label>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setStatus('planned')}
                className={`py-2.5 rounded-xl font-bold text-sm transition-all border-2 ${status === 'planned' ? 'border-yellow-400 bg-yellow-400/10 text-yellow-300' : 'border-white/10 text-white/50'}`}>
                📅 Agendado
              </button>
              <button onClick={() => setStatus('paid')}
                className={`py-2.5 rounded-xl font-bold text-sm transition-all border-2 ${status === 'paid' ? 'border-green-400 bg-green-400/10 text-green-300' : 'border-white/10 text-white/50'}`}>
                ✅ Pago
              </button>
            </div>
          </div>

          <div>
            <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">Valor {status === 'paid' ? 'pago' : 'planejado'} (R$)</label>
            <input type="number" min="0" step="0.01" value={totalPaid}
              onChange={e => setTotalPaid(e.target.value)}
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white text-lg font-bold focus:border-green-400" />
          </div>

          {status === 'paid' && (
            <div>
              <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">Data do pagamento</label>
              <input type="date" value={paidAt} onChange={e => setPaidAt(e.target.value)}
                className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-400" />
            </div>
          )}

          <div>
            <label className="block text-[10px] sm:text-xs uppercase tracking-widest text-white/60 mb-2 font-bold">Observação (opcional)</label>
            <input type="text" value={note} onChange={e => setNote(e.target.value)}
              placeholder="Ex: Pago em dinheiro"
              className="w-full bg-black/50 border-2 border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-400" />
          </div>

          <button onClick={submit}
            className="w-full py-3 sm:py-4 rounded-xl font-bold text-black bungee text-base sm:text-lg"
            style={{ background: `linear-gradient(135deg, ${player?.color || '#76FF03'}, #76FF03)`, boxShadow: '0 0 20px rgba(118,255,3,0.4)' }}>
            {existingPayment ? 'Atualizar' : 'Salvar'}
          </button>
        </div>
    </BottomSheet>
  );
}

    // ================================================================
    // RENDER

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AppWrapper));

  </script>
