  <!-- Firebase SDK com Authentication -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDmOwB_QTt7yMPIATGBDWZm_PimB_OK5kE",
      authDomain: "habitclan-48f90.firebaseapp.com",
      databaseURL: "https://habitclan-48f90-default-rtdb.firebaseio.com",
      projectId: "habitclan-48f90",
      storageBucket: "habitclan-48f90.firebasestorage.app",
      messagingSenderId: "726217058037",
      appId: "1:726217058037:web:6b46bbf2d2bf64b46987bc"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const auth = getAuth(app);

    // Faz login anônimo assim que o app abre (sem precisar de email/senha)
    // O UID anônimo fica salvo no dispositivo automaticamente
    signInAnonymously(auth).catch(console.error);

    onAuthStateChanged(auth, (user) => {
      window._authUser = user;
      window._authReady = true;
      window.dispatchEvent(new CustomEvent('authReady', { detail: user }));
    });

    window._firebase = {
      async read(path) {
        const snap = await get(ref(db, path));
        return snap.exists() ? snap.val() : null;
      },
      async write(path, value) {
        await set(ref(db, path), value);
      },
      subscribe(path, callback) {
        const r = ref(db, path);
        onValue(r, snap => callback(snap.exists() ? snap.val() : null));
      },
      // Escrever dado de autenticação de um player (PIN hash)
      async writePlayerAuth(playerId, data) {
        await set(ref(db, `habitclan_auth/${playerId}`), data);
      },
      async readPlayerAuth(playerId) {
        const snap = await get(ref(db, `habitclan_auth/${playerId}`));
        return snap.exists() ? snap.val() : null;
      }
    };

    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
  </script>

    const FAMILY_CODE = "Hecr1202";

    // ================================================================
    // Firebase Storage Adapter
    // ================================================================
    const DB_ROOT = 'habitclan';
    const firebaseStorage = {
      async get(key) {
        if (!window._firebase) return null;
        try {
          const val = await window._firebase.read(`${DB_ROOT}/${key}`);
          return val !== null ? { value: typeof val === 'string' ? val : JSON.stringify(val) } : null;
        } catch (e) { return null; }
      },
      async set(key, value) {
        if (!window._firebase) return null;
        try {
          let toStore = value;
          try { toStore = JSON.parse(value); } catch (e) {}
          await window._firebase.write(`${DB_ROOT}/${key}`, toStore);
          return { value };
        } catch (e) { return null; }
      }
    };
    window.storage = firebaseStorage;

    // ================================================================
    // PIN UTILS — hash simples do PIN para não salvar em texto puro
    // ================================================================
    async function hashPin(pin) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pin + 'habitclan_salt_2024');
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    }

    // ================================================================
    // TECLADO PIN — 4 círculos + numpad
    // ================================================================
    function PinKeypad({ title, subtitle, accentColor, onComplete, onBack, error, clearError }) {
      const [digits, setDigits] = useState([]);

      const addDigit = (d) => {
        if (error) clearError();
        if (digits.length >= 4) return;
        const next = [...digits, d];
        setDigits(next);
        if (next.length === 4) {
          setTimeout(() => onComplete(next.join('')), 120);
        }
      };

      const removeDigit = () => {
        if (error) clearError();
        setDigits(digits.slice(0, -1));
      };

      useEffect(() => {
        if (error) setDigits([]);
      }, [error]);

      const color = accentColor || '#FF3D9A';
      const nums = [1,2,3,4,5,6,7,8,9,null,0,'⌫'];

      return (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'24px', padding:'24px 16px 40px', fontFamily:"'Space Grotesk',system-ui" }}>
          <div style={{ textAlign:'center' }}>
            <div className="bungee" style={{ fontSize:'1.4rem', color, marginBottom:'6px' }}>{title}</div>
            <div style={{ fontSize:'13px', color:'rgba(255,255,255,0.5)' }}>{subtitle}</div>
          </div>

          {/* 4 círculos */}
          <div style={{ display:'flex', gap:'16px' }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{
                width:'18px', height:'18px', borderRadius:'50%',
                border: `2px solid ${digits.length > i ? color : 'rgba(255,255,255,0.2)'}`,
                background: digits.length > i ? color : 'transparent',
                boxShadow: digits.length > i ? `0 0 12px ${color}` : 'none',
                transition: 'all 0.15s ease'
              }} />
            ))}
          </div>

          {/* Erro */}
          {error && (
            <div style={{ color:'#FF5252', fontSize:'13px', textAlign:'center', marginTop:'-8px' }}>
              {error}
            </div>
          )}

          {/* Numpad */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 72px)', gap:'12px' }}>
            {nums.map((n, i) => (
              <button
                key={i}
                onClick={() => {
                  if (n === null) return;
                  if (n === '⌫') removeDigit();
                  else addDigit(String(n));
                }}
                disabled={n === null}
                style={{
                  width:'72px', height:'72px', borderRadius:'50%',
                  background: n === null ? 'transparent' : 'rgba(255,255,255,0.07)',
                  border: n === null ? 'none' : '1px solid rgba(255,255,255,0.1)',
                  color: 'white',
                  fontSize: typeof n === 'number' ? '24px' : '20px',
                  fontWeight: '600',
                  cursor: n === null ? 'default' : 'pointer',
                  fontFamily: 'inherit',
                  transition: 'background 0.1s',
                  WebkitTapHighlightColor: 'transparent',
                  outline: 'none',
                }}
                onTouchStart={e => { if(n!==null) e.currentTarget.style.background='rgba(255,255,255,0.15)'; }}
                onTouchEnd={e => { if(n!==null) e.currentTarget.style.background='rgba(255,255,255,0.07)'; }}
              >
                {n}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // TELA DE SELEÇÃO DE PERFIL
    // ================================================================

    // ================================================================
    // TELA DE PIN (login ou cadastro)
    // ================================================================
    function PinScreen({ player, mode, onSuccess, onBack }) {
      // mode: 'login' | 'setup_code' | 'setup_pin' | 'setup_confirm'
      const [step, setStep] = useState(mode);
      const [familyCodeInput, setFamilyCodeInput] = useState('');
      const [firstPin, setFirstPin] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [codeError, setCodeError] = useState('');

      const handleLogin = async (pin) => {
        setLoading(true);
        try {
          const authData = await window._firebase.readPlayerAuth(player.id);
          if (!authData) {
            setError('PIN não cadastrado. Cadastre-se primeiro.');
            setLoading(false);
            return;
          }
          const hash = await hashPin(pin);
          if (hash === authData.pinHash) {
            // Salva sessão localmente
            localStorage.setItem('hc_session', JSON.stringify({
              playerId: player.id,
              playerName: player.name,
              timestamp: Date.now()
            }));
            onSuccess(player);
          } else {
            setError('PIN incorreto. Tente novamente.');
          }
        } catch (e) {
          setError('Erro ao verificar PIN.');
        }
        setLoading(false);
      };

      const handleSetupPin = async (pin) => {
        setFirstPin(pin);
        setStep('setup_confirm');
      };

      const handleConfirmPin = async (pin) => {
        if (pin !== firstPin) {
          setError('Os PINs não coincidem. Tente novamente.');
          setFirstPin('');
          setStep('setup_pin');
          return;
        }
        setLoading(true);
        try {
          const hash = await hashPin(pin);
          await window._firebase.writePlayerAuth(player.id, {
            pinHash: hash,
            createdAt: Date.now(),
            playerName: player.name
          });
          localStorage.setItem('hc_session', JSON.stringify({
            playerId: player.id,
            playerName: player.name,
            timestamp: Date.now()
          }));
          onSuccess(player);
        } catch (e) {
          setError('Erro ao salvar PIN. Tente novamente.');
        }
        setLoading(false);
      };

      const submitFamilyCode = () => {
        if (familyCodeInput.trim() === FAMILY_CODE) {
          setStep('setup_pin');
        } else {
          setCodeError('Código incorreto. Peça ao responsável da família.');
        }
      };

      if (loading) return <LoadingScreen message="VERIFICANDO..." />;

      return (
        <div style={{ minHeight:'100vh', background:'#0A0612', display:'flex', flexDirection:'column', fontFamily:"'Space Grotesk',system-ui" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;600;700&display=swap');
            .bungee{font-family:'Bungee',system-ui,sans-serif;}
          `}</style>

          {/* Header com voltar */}
          <div style={{ display:'flex', alignItems:'center', padding:'16px', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
            <button onClick={onBack} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.6)', fontSize:'14px', cursor:'pointer', display:'flex', alignItems:'center', gap:'6px', padding:'8px', fontFamily:'inherit' }}>
              ← Voltar
            </button>
            <div style={{ flex:1, textAlign:'center' }}>
              <span style={{ fontSize:'32px', filter:`drop-shadow(0 0 12px ${player.color})` }}>{player.emoji}</span>
            </div>
            <div style={{ width:'60px' }} />
          </div>

          <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'16px' }}>

            {/* LOGIN */}
            {step === 'login' && (
              <PinKeypad
                title={`Olá, ${player.name}!`}
                subtitle="Digite seu PIN de 4 dígitos"
                accentColor={player.color}
                onComplete={handleLogin}
                error={error}
                clearError={() => setError('')}
              />
            )}

            {/* SETUP — código da família */}
            {step === 'setup_code' && (
              <div style={{ width:'100%', maxWidth:'320px', display:'flex', flexDirection:'column', gap:'16px' }}>
                <div style={{ textAlign:'center' }}>
                  <div className="bungee" style={{ fontSize:'1.4rem', color: player.color, marginBottom:'6px' }}>
                    Primeiro acesso
                  </div>
                  <div style={{ fontSize:'13px', color:'rgba(255,255,255,0.5)', lineHeight:1.5 }}>
                    Para se cadastrar, peça o código da família ao responsável.
                  </div>
                </div>
                <input
                  type="password"
                  value={familyCodeInput}
                  onChange={e => { setFamilyCodeInput(e.target.value); setCodeError(''); }}
                  onKeyDown={e => e.key === 'Enter' && submitFamilyCode()}
                  placeholder="Código da família"
                  autoFocus
                  style={{
                    width:'100%', padding:'14px 16px', borderRadius:'14px',
                    background:'rgba(255,255,255,0.05)',
                    border:`2px solid ${codeError ? '#FF5252' : 'rgba(255,255,255,0.1)'}`,
                    color:'white', fontSize:'16px', fontFamily:'inherit',
                    outline:'none', letterSpacing:'0.2em', textAlign:'center'
                  }}
                />
                {codeError && <p style={{ color:'#FF5252', fontSize:'12px', textAlign:'center', margin:0 }}>{codeError}</p>}
                <button
                  onClick={submitFamilyCode}
                  style={{
                    width:'100%', padding:'14px', borderRadius:'14px', border:'none',
                    background: `linear-gradient(135deg, ${player.color}, #FFD600)`,
                    color:'black', fontWeight:'800', fontSize:'15px',
                    cursor:'pointer', fontFamily:"'Bungee',system-ui"
                  }}>
                  CONTINUAR
                </button>
              </div>
            )}

            {/* SETUP — escolher PIN */}
            {step === 'setup_pin' && (
              <PinKeypad
                title="Crie seu PIN"
                subtitle={`Escolha 4 dígitos, ${player.name}`}
                accentColor={player.color}
                onComplete={handleSetupPin}
                error={error}
                clearError={() => setError('')}
              />
            )}

            {/* SETUP — confirmar PIN */}
            {step === 'setup_confirm' && (
              <PinKeypad
                title="Confirme seu PIN"
                subtitle="Digite os mesmos 4 dígitos"
                accentColor={player.color}
                onComplete={handleConfirmPin}
                error={error}
                clearError={() => setError('')}
              />
            )}
          </div>
        </div>
      );
    }

    // ================================================================
    // APP WRAPPER — orquestra loading → perfil → pin → app
    // ================================================================
    function AppWrapper() {
      const [phase, setPhase] = useState('loading'); // loading | select | pin | app
      const [players, setPlayers] = useState([]);
      const [selectedPlayer, setSelectedPlayer] = useState(null);
      const [pinMode, setPinMode] = useState('login');
      const [currentUser, setCurrentUser] = useState(null);
      const [fbReady, setFbReady] = useState(false);

      // Aguarda Firebase
      useEffect(() => {
        const onReady = () => setFbReady(true);
        if (window._firebaseReady) onReady();
        else window.addEventListener('firebaseReady', onReady);
        return () => window.removeEventListener('firebaseReady', onReady);
      }, []);

      // Após Firebase pronto: carrega players e verifica sessão salva
      useEffect(() => {
        if (!fbReady) return;

        (async () => {
          // Carrega lista de jogadores do Firebase
          let ps = [];
          try {
            const raw = await window._firebase.read('habitclan/players');
            if (raw) ps = Array.isArray(raw) ? raw : Object.values(raw);
          } catch (e) {}

          // Fallback: jogadores padrão se ainda não há dados
          if (!ps || ps.length === 0) {
            ps = [
              { id:'p1', name:'Papai', emoji:'🦾', color:'#00E5FF' },
              { id:'p2', name:'Mamãe', emoji:'💫', color:'#FF3D9A' },
              { id:'p3', name:'Filha 1', emoji:'🦄', color:'#FFD600' },
              { id:'p4', name:'Filha 2', emoji:'🌈', color:'#76FF03' },
            ];
          }
          setPlayers(ps);

          // Verifica sessão local salva (auto-login)
          try {
            const session = JSON.parse(localStorage.getItem('hc_session') || 'null');
            const SESSION_DAYS = 30;
            if (session && Date.now() - session.timestamp < SESSION_DAYS * 86400000) {
              const player = ps.find(p => p.id === session.playerId);
              if (player) {
                // Verifica se ainda tem PIN cadastrado
                const authData = await window._firebase.readPlayerAuth(player.id);
                if (authData) {
                  setCurrentUser(player);
                  setPhase('app');
                  return;
                }
              }
            }
          } catch (e) {}

          setPhase('select');
        })();
      }, [fbReady]);

      const handleSelectPlayer = async (player) => {
        setSelectedPlayer(player);
        // Verifica se já tem PIN cadastrado
        try {
          const authData = await window._firebase.readPlayerAuth(player.id);
          setPinMode(authData ? 'login' : 'setup_code');
        } catch (e) {
          setPinMode('setup_code');
        }
        setPhase('pin');
      };

      const handlePinSuccess = (player) => {
        setCurrentUser(player);
        setPhase('app');
      };

      const handleLogout = () => {
        localStorage.removeItem('hc_session');
        setCurrentUser(null);
        setSelectedPlayer(null);
        setPhase('select');
      };

      const handleResetPin = async (playerId) => {
        // Só admin (Heitor - p1) pode resetar outros, qualquer um pode resetar o próprio
        await window._firebase.writePlayerAuth(playerId, null);
        // Remove sessão se for o próprio
        const session = JSON.parse(localStorage.getItem('hc_session') || 'null');
        if (session?.playerId === playerId) localStorage.removeItem('hc_session');
      };

      if (phase === 'loading') return <LoadingScreen />;
      if (phase === 'select') return <ProfileSelectScreen players={players} onSelectPlayer={handleSelectPlayer} />;
      if (phase === 'pin') return (
        <PinScreen
          player={selectedPlayer}
          mode={pinMode}
          onSuccess={handlePinSuccess}
          onBack={() => setPhase('select')}
        />
      );

      // App principal
      return <HabitClan currentUser={currentUser} onLogout={handleLogout} onResetPin={handleResetPin} allPlayers={players} />;
    }

// ============== SOUND ENGINE ==============
const playSound = (type) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    if (type === 'complete') {
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, now + i * 0.08);
        gain.gain.setValueAtTime(0, now + i * 0.08);
        gain.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.15);
      });
    } else if (type === 'achievement') {
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + i * 0.1);
        gain.gain.setValueAtTime(0, now + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
      });
    } else if (type === 'click') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.05);
    }
  } catch (e) {}
};

// ============== UTILS ==============
const todayKey = () => new Date().toISOString().split('T')[0];
const weekKey = (d = new Date()) => {
  const year = d.getFullYear();
  const start = new Date(year, 0, 1);
  const week = Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
  return `${year}-W${week}`;
};
const monthKey = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;

// Retorna o ícone visual da tarefa (emoji próprio ou ícone da categoria)

  if (task.emoji) return task.emoji;
  const cat = CATEGORIES.find(c => c.id === task.category);
  return cat?.icon || '⭐';
};

const isFrequencyActiveToday = (frequency) => {
  const day = new Date().getDay(); // 0=dom, 1=seg, ..., 6=sab
  if (frequency === 'daily') return true;
  if (frequency === 'weekdays') return day >= 1 && day <= 5;
  if (frequency === 'weekend') return day === 0 || day === 6;
  if (frequency === 'weekly') return true;
  if (frequency === 'monthly') return true;
  return true;
};

const blendColors = (colors) => {
  if (colors.length === 0) return null;
  if (colors.length === 1) return colors[0];
  const count = {};
  colors.forEach(c => count[c] = (count[c] || 0) + 1);
  return Object.entries(count).sort((a, b) => b[1] - a[1])[0][0];
};

  useEffect(() => { if (loaded) window.storage.set('players', JSON.stringify(players), true).catch(() => {}); }, [players, loaded]);

  useEffect(() => { if (loaded) window.storage.set('completions', JSON.stringify(completions), true).catch(() => {}); }, [completions, loaded]);
  useEffect(() => { if (loaded) window.storage.set('rewards', JSON.stringify(rewards), true).catch(() => {}); }, [rewards, loaded]);
  useEffect(() => { if (loaded) window.storage.set('allowances', JSON.stringify(allowances), true).catch(() => {}); }, [allowances, loaded]);
  useEffect(() => { if (loaded) window.storage.set('allowancePayments', JSON.stringify(allowancePayments), true).catch(() => {}); }, [allowancePayments, loaded]);
  useEffect(() => { if (loaded) window.storage.set('homeMode', homeMode, true).catch(() => {}); }, [homeMode, loaded]);

  const getGoalForPlayer = (task, playerId) => {
    if (task.perPlayerGoals && task.perPlayerGoals[playerId] != null) return task.perPlayerGoals[playerId];
    return task.goal || 1;
  };
  const getPointsForPlayer = (task, playerId) => {
    if (task.perPlayerPoints && task.perPlayerPoints[playerId] != null) return task.perPlayerPoints[playerId];
    return task.points || 10;
  };

  const getPoints = (playerId, period = 'month') => {
    return completions.filter(c => {
      if (c.playerId !== playerId) return false;
      if (period === 'day') return c.date === todayKey();
      if (period === 'week') return c.weekKey === weekKey();
      if (period === 'month') return c.monthKey === monthKey();
      return true;
    }).reduce((s, c) => s + c.points, 0);
  };

  const getStreak = (playerId) => {
    const dates = new Set(completions.filter(c => c.playerId === playerId).map(c => c.date));
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().split('T')[0];
      if (dates.has(key)) { streak++; d.setDate(d.getDate() - 1); }
      else { if (streak === 0 && key === todayKey()) { d.setDate(d.getDate() - 1); continue; } break; }
    }
    return streak;
  };

  const computeBadges = (playerId, comps) => {
    const totalCompletions = comps.filter(c => c.playerId === playerId).length;
    const totalPoints = comps.filter(c => c.playerId === playerId).reduce((s, c) => s + c.points, 0);
    const dates = new Set(comps.filter(c => c.playerId === playerId).map(c => c.date));
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().split('T')[0];
      if (dates.has(key)) { streak++; d.setDate(d.getDate() - 1); }
      else { if (streak === 0 && key === todayKey()) { d.setDate(d.getDate() - 1); continue; } break; }
    }
    const badges = [];
    if (totalCompletions >= 1) badges.push({ id: 'first', name: 'Primeiro Passo', icon: '🌱' });
    if (totalCompletions >= 10) badges.push({ id: 'ten', name: 'Em Ritmo', icon: '⚡' });
    if (totalCompletions >= 50) badges.push({ id: 'fifty', name: 'Máquina', icon: '🔥' });
    if (totalCompletions >= 100) badges.push({ id: 'hundred', name: 'Centurião', icon: '💎' });
    if (totalPoints >= 500) badges.push({ id: 'p500', name: '500 Pontos', icon: '⭐' });
    if (totalPoints >= 1000) badges.push({ id: 'p1000', name: 'Mil Pontos', icon: '👑' });
    if (streak >= 3) badges.push({ id: 's3', name: '3 Dias', icon: '🎯' });
    if (streak >= 7) badges.push({ id: 's7', name: '1 Semana', icon: '🏆' });
    if (streak >= 30) badges.push({ id: 's30', name: 'Lendário', icon: '🌟' });
    return badges;
  };

  const getBadges = (playerId) => computeBadges(playerId, completions);

  const isTaskAssignedTo = (task, playerId) => {
    if (!task.assignedTo || task.assignedTo === 'all') return true;
    if (Array.isArray(task.assignedTo)) return task.assignedTo.includes(playerId);
    return false;
  };

  const getTasksForPlayer = (playerId) => tasks.filter(t => isTaskAssignedTo(t, playerId));

  const getTaskProgress = (taskId, playerId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return { current: 0, goal: 1 };
    const goal = getGoalForPlayer(task, playerId);
    let done = 0;
    if (task.frequency === 'daily' || task.frequency === 'weekdays' || task.frequency === 'weekend') {
      done = completions.filter(c => c.taskId === taskId && c.playerId === playerId && c.date === todayKey()).length;
    } else if (task.frequency === 'weekly') {
      done = completions.filter(c => c.taskId === taskId && c.playerId === playerId && c.weekKey === weekKey()).length;
    } else if (task.frequency === 'monthly') {
      done = completions.filter(c => c.taskId === taskId && c.playerId === playerId && c.monthKey === monthKey()).length;
    }
    return { current: done, goal };
  };

  const isTaskDone = (taskId, playerId) => {
    const p = getTaskProgress(taskId, playerId);
    return p.current >= p.goal;
  };

  // Verifica se já marcou essa tarefa hoje (para saber se deve mostrar opções)
  const isTaskDoneToday = (taskId, playerId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return false;
    const doneToday = completions.filter(c =>
      c.taskId === taskId && c.playerId === playerId && c.date === todayKey()
    ).length;
    // Para weekly/monthly: limite é 1x/dia
    if (task.frequency === 'weekly' || task.frequency === 'monthly') return doneToday >= 1;
    // Para daily/weekdays/weekend: verifica contra a meta
    const goal = getGoalForPlayer(task, playerId);
    return doneToday >= goal;
  };

  const completeTask = (taskId, playerId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const progress = getTaskProgress(taskId, playerId);
    if (progress.current >= progress.goal) return;
    // Cenário 3: limite de 1x por dia para tarefas semanais/mensais
    // (garante que não marque 2x no mesmo dia mesmo com meta semanal > 1)
    if (task.frequency === 'weekly' || task.frequency === 'monthly') {
      const doneToday = completions.filter(c =>
        c.taskId === taskId && c.playerId === playerId && c.date === todayKey()
      ).length;
      if (doneToday >= 1) return; // já marcou hoje
    }

    const points = getPointsForPlayer(task, playerId);
    const prevBadges = getBadges(playerId).length;
    const newCompletion = {
      id: Date.now() + '-' + Math.random(),
      taskId, playerId,
      date: todayKey(),
      weekKey: weekKey(),
      monthKey: monthKey(),
      points,
      timestamp: Date.now(),
    };
    const updated = [...completions, newCompletion];
    setCompletions(updated);
    playSound('complete');

    const player = players.find(p => p.id === playerId);
    const cat = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[5];
    setCelebration({ player, task, points, catIcon: getTaskIcon(task) });
    setTimeout(() => setCelebration(null), 1800);

    setTimeout(() => {
      const newBadges = computeBadges(playerId, updated);
      if (newBadges.length > prevBadges) {
        const latest = newBadges[newBadges.length - 1];
        setNewBadge({ player, badge: latest });
        playSound('achievement');
        setTimeout(() => setNewBadge(null), 2800);
      }
    }, 1500);
  };

  // Marcar tarefa em data passada
  const completeTaskForDate = (taskId, playerId, dateStr) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const d = new Date(dateStr + 'T12:00:00');
    const wKey = weekKey(d);
    const mKey = monthKey(d);
    // Verificar se já atingiu a meta naquele dia
    const goal = getGoalForPlayer(task, playerId);
    const doneOnDate = completions.filter(c =>
      c.taskId === taskId && c.playerId === playerId && c.date === dateStr
    ).length;
    // Limite: 1x por dia para weekly/monthly; goal vezes para os demais
    const dailyLimit = (task.frequency === 'weekly' || task.frequency === 'monthly') ? 1 : goal;
    if (doneOnDate >= dailyLimit) return; // já atingiu o limite naquele dia
    const points = getPointsForPlayer(task, playerId);
    const newCompletion = {
      id: Date.now() + '-' + Math.random(),
      taskId, playerId,
      date: dateStr,
      weekKey: wKey,
      monthKey: mKey,
      points,
      timestamp: Date.now(),
    };
    setCompletions(prev => [...prev, newCompletion]);
    playSound('complete');
  };

  // Desfazer marcação de tarefa (remove a completion mais recente do dia)
  const uncompleteTask = (taskId, playerId, dateStr) => {
    const dateCompletions = completions.filter(c =>
      c.taskId === taskId && c.playerId === playerId && c.date === dateStr
    );
    if (dateCompletions.length === 0) return;
    // Remove a mais recente
    const toRemove = dateCompletions.sort((a, b) => b.timestamp - a.timestamp)[0];
    setCompletions(prev => prev.filter(c => c.id !== toRemove.id));
    playSound('click');
  };

  const saveTask = (taskData) => {
    if (taskData.id) setTasks(tasks.map(t => t.id === taskData.id ? taskData : t));
    else setTasks([...tasks, { ...taskData, id: 'task-' + Date.now() }]);
    playSound('click');
    setShowTaskModal(null);
  };

  const removeTask = (taskId) => {
    setTasks(tasks.filter(t => t.id !== taskId));
    setCompletions(completions.filter(c => c.taskId !== taskId));
  };

  const savePlayer = (playerData) => {
    if (playerData.id && players.find(p => p.id === playerData.id)) {
      setPlayers(players.map(p => p.id === playerData.id ? playerData : p));
    } else {
      setPlayers([...players, { ...playerData, id: 'player-' + Date.now() }]);
    }
    playSound('click');
    setShowPlayerModal(null);
  };

  const removePlayer = (playerId) => {
    if (players.length <= 1) { alert('Precisa ter pelo menos 1 jogador.'); return; }
    setPlayers(players.filter(p => p.id !== playerId));
    setCompletions(completions.filter(c => c.playerId !== playerId));
    setTasks(tasks.map(t => {
      const newPerPlayerGoals = { ...t.perPlayerGoals };
      const newPerPlayerPoints = { ...t.perPlayerPoints };
      delete newPerPlayerGoals[playerId];
      delete newPerPlayerPoints[playerId];
      if (Array.isArray(t.assignedTo)) {
        const filtered = t.assignedTo.filter(id => id !== playerId);
        return { ...t, assignedTo: filtered.length > 0 ? filtered : 'all', perPlayerGoals: newPerPlayerGoals, perPlayerPoints: newPerPlayerPoints };
      }
      return { ...t, perPlayerGoals: newPerPlayerGoals, perPlayerPoints: newPerPlayerPoints };
    }));
  };

  const saveReward = (rewardData) => {
    if (rewardData.id && rewards.find(r => r.id === rewardData.id)) {
      setRewards(rewards.map(r => r.id === rewardData.id ? rewardData : r));
    } else {
      setRewards([...rewards, { ...rewardData, id: 'reward-' + Date.now() }]);
    }
    playSound('click');
    setShowRewardModal(null);
  };

  const removeReward = (rewardId) => setRewards(rewards.filter(r => r.id !== rewardId));

  const markRewardAwarded = (rewardId, playerId) => {
    setRewards(rewards.map(r => r.id === rewardId ? { ...r, awarded: true, awardedTo: playerId, awardedAt: Date.now() } : r));
    playSound('achievement');
  };

  // ===== MESADAS =====
  const getAllowanceConfig = (playerId) => allowances.find(a => a.playerId === playerId) || null;

  const calcBonus = (playerId, mKey) => {
    const config = getAllowanceConfig(playerId);
    if (!config || !config.bonusTiers || !config.bonusTiers.length) return 0;
    const pts = getPointsForMonth(playerId, mKey);
    let pct = 0;
    config.bonusTiers.forEach(tier => {
      if (pts >= tier.minPoints) pct = Math.max(pct, tier.pct);
    });
    return Math.round((config.baseAmount || 0) * pct / 100);
  };

  const getPointsForMonth = (playerId, mKey) => {
    return completions.filter(c => c.playerId === playerId && c.monthKey === mKey).reduce((s, c) => s + c.points, 0);
  };

  const calcTotal = (playerId, mKey) => {
    const config = getAllowanceConfig(playerId);
    if (!config) return 0;
    return (config.baseAmount || 0) + calcBonus(playerId, mKey);
  };

  const getPayment = (playerId, mKey) => allowancePayments.find(p => p.playerId === playerId && p.monthKey === mKey) || null;

  const saveAllowanceConfig = (playerId, config) => {
    setAllowances(prev => {
      const exists = prev.find(a => a.playerId === playerId);
      if (exists) return prev.map(a => a.playerId === playerId ? { ...a, ...config } : a);
      return [...prev, { playerId, ...config }];
    });
    playSound('click');
    setShowAllowanceModal(null);
  };

  const removeAllowanceConfig = (playerId) => {
    setAllowances(prev => prev.filter(a => a.playerId !== playerId));
    setAllowancePayments(prev => prev.filter(p => p.playerId !== playerId));
  };

  const savePayment = (paymentData) => {
    setAllowancePayments(prev => {
      const exists = prev.find(p => p.id === paymentData.id);
      if (exists) return prev.map(p => p.id === paymentData.id ? paymentData : p);
      return [...prev, { ...paymentData, id: 'pay-' + Date.now() }];
    });
    playSound('click');
    setShowPaymentModal(null);
  };

  const removePayment = (paymentId) => {
    setAllowancePayments(prev => prev.filter(p => p.id !== paymentId));
  };

  return (
    <div className="min-h-screen relative overflow-hidden" style={{ background: '#0A0612', fontFamily: "'Space Grotesk', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap');
        @keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

        @keyframes slideDown { 0% { transform: translate(-50%, -100%); opacity: 0; } 15% { transform: translate(-50%, 0); opacity: 1; } 85% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -100%); opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        .sheet-enter { animation: slideUp 0.32s cubic-bezier(0.32, 0.72, 0, 1); }
        .sheet-bg { animation: fadeInBg 0.2s ease; }
        .grid-bg { background-image: linear-gradient(rgba(255,61,154,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.08) 1px, transparent 1px); background-size: 60px 60px; animation: gridShift 20s linear infinite; }
        .neon-text { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor; }
        .bungee { font-family: 'Bungee', system-ui, sans-serif; letter-spacing: 0.02em; }
        .scrollbar-custom::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: rgba(255,61,154,0.5); border-radius: 3px; }
        input, select, textarea { font-family: inherit; }
        input:focus, select:focus { outline: none; }
        .task-icon-btn { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); -webkit-tap-highlight-color: transparent; }
        .task-icon-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.05); }
        .task-icon-btn:active:not(:disabled) { transform: scale(0.95); }
        .task-icon-btn.done { opacity: 0.35; filter: grayscale(0.6); }
        .float-anim { animation: float 4s ease-in-out infinite; }
        button { -webkit-tap-highlight-color: transparent; }
      `}</style>

      <div className="absolute inset-0 grid-bg pointer-events-none" />
      <div className="absolute top-0 left-0 w-[400px] md:w-[600px] h-[400px] md:h-[600px] rounded-full opacity-30 pointer-events-none" style={{ background: 'radial-gradient(circle, #FF3D9A 0%, transparent 70%)', filter: 'blur(80px)' }} />
      <div className="absolute bottom-0 right-0 w-[400px] md:w-[600px] h-[400px] md:h-[600px] rounded-full opacity-30 pointer-events-none" style={{ background: 'radial-gradient(circle, #00E5FF 0%, transparent 70%)', filter: 'blur(80px)' }} />

      <div className="relative z-10 max-w-7xl mx-auto p-3 sm:p-4 md:p-6 lg:p-8">
        <header className="mb-4 sm:mb-6 md:mb-8 flex flex-col gap-3">

            <div className="flex items-center gap-2 sm:gap-3 min-w-0">

              <button
                onClick={() => { setShowSettingsModal(true); playSound('click'); }}

        <PaymentModal

          calcBonus={calcBonus}
          getAllowanceConfig={getAllowanceConfig}
          onClose={() => setShowPaymentModal(null)}
          onSave={savePayment}
        />
      )}

      {showTaskActionModal && (
        <TaskActionModal
          taskId={showTaskActionModal.taskId}
          playerId={showTaskActionModal.playerId}
          tasks={tasks}
          players={players}
          completions={completions}
          getGoalForPlayer={getGoalForPlayer}
          onClose={() => setShowTaskActionModal(null)}
          onCompleteForDate={completeTaskForDate}
          onUncomplete={uncompleteTask}
        />
      )}

      {celebration && (
        <div className="fixed inset-0 flex items-center justify-center pointer-events-none z-50 px-4">
          <div style={{ animation: 'celebrate 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' }} className="text-center">
            <div className="text-6xl sm:text-8xl mb-2">{celebration.player.emoji}</div>
            <div className="bungee text-4xl sm:text-6xl neon-text" style={{ color: celebration.player.color }}>
              +{celebration.points}
            </div>

      {newBadge && (
        <div className="fixed top-4 sm:top-8 left-1/2 z-50 bg-black border-2 rounded-2xl px-4 sm:px-6 py-3 sm:py-4 flex items-center gap-3 sm:gap-4 shadow-2xl max-w-[90vw]"
          style={{ borderColor: newBadge.player.color, animation: 'slideDown 2.8s ease-in-out', boxShadow: `0 0 40px ${newBadge.player.color}` }}>
          <div className="text-3xl sm:text-5xl">{newBadge.badge.icon}</div>

            <div className="bungee text-base sm:text-xl text-white truncate">{newBadge.badge.name}</div>
            <div className="text-white/60 text-xs sm:text-sm truncate">{newBadge.player.name}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============== HOME COMPACT (nova visão limpa) ==============
function CompactHomeView({ players, tasks, getPoints, getStreak, getTaskProgress, isTaskDone, isTaskDoneToday, onComplete, onTaskAction, getTasksForPlayer, completions, currentUser }) {
  return (
    <div className="space-y-3">
      {[...players].sort((a, b) => {
          if (currentUser) {
            if (a.id === currentUser.id) return -1;
            if (b.id === currentUser.id) return 1;
          }
          return 0;
        }).map((player) => {
        const isMe = currentUser && player.id === currentUser.id;
        const allPlayerTasks = getTasksForPlayer(player.id);
        // Tarefas ativas hoje (weekdays só seg-sex, weekend só sab-dom)
        const playerTasks = allPlayerTasks.filter(t => isFrequencyActiveToday(t.frequency));
        const inactiveTasks = allPlayerTasks.filter(t => !isFrequencyActiveToday(t.frequency));
        const monthPts = getPoints(player.id, 'month');
        const dayPts = getPoints(player.id, 'day');
        const streak = getStreak(player.id);
        const totalTasks = playerTasks.length;
        // doneTasks conta tarefas com marcação hoje (para barra de progresso do dia)
        const doneTasks = playerTasks.filter(t => isTaskDoneToday(t.id, player.id)).length;
        const completionPct = totalTasks > 0 ? (doneTasks / totalTasks) * 100 : 0;

        return (
          <div key={player.id}
            className="bg-black/50 backdrop-blur-sm border-2 rounded-2xl p-3 sm:p-4"
            style={{
              borderColor: isMe ? player.color + 'cc' : player.color + '40',
              boxShadow: isMe ? `0 0 30px ${player.color}50` : `0 0 10px ${player.color}10`,
              background: isMe ? `linear-gradient(135deg, ${player.color}12, rgba(0,0,0,0.7))` : undefined,
            }}>
            {isMe && (
              <div className="absolute -top-2.5 left-4">
                <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ background: player.color, color: 'black' }}>
                  VOCÊ
                </span>
              </div>
            )}

            {/* Linha do jogador (tudo numa linha só) */}
            <div className="flex items-center gap-2 sm:gap-3 mb-3">
              <div className="text-3xl sm:text-4xl flex-shrink-0" style={{ filter: `drop-shadow(0 0 10px ${player.color})` }}>
                {player.emoji}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="bungee text-base sm:text-lg text-white truncate">{player.name}</span>
                  {streak > 0 && (
                    <span className="flex items-center gap-0.5 bg-orange-500/20 text-orange-300 px-1.5 py-0.5 rounded-full text-[10px] font-bold">
                      <Flame size={10} />{streak}
                    </span>
                  )}
                </div>
                <div className="flex items-center gap-2 mt-0.5">
                  <span className="bungee text-base sm:text-lg" style={{ color: player.color }}>{monthPts}</span>
                  <span className="text-[10px] text-white/50 uppercase">pts</span>
                  {dayPts > 0 && <span className="text-[10px] text-green-400 font-bold">+{dayPts} hoje</span>}
                </div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className="text-xs text-white/70 font-bold">{doneTasks}/{totalTasks}</div>
                <div className="w-12 sm:w-16 h-1.5 bg-white/10 rounded-full mt-1 overflow-hidden">
                  <div className="h-full transition-all" style={{ width: `${completionPct}%`, background: player.color }} />
                </div>
              </div>
            </div>

            {/* PILL LIST — emoji + nome visível, sem ambiguidade */}
            {totalTasks === 0 ? (
              <div className="text-white/30 text-xs italic text-center py-2">Nenhuma tarefa atribuída</div>
            ) : (
              <div className="flex flex-col gap-1.5">
                {playerTasks.map(task => {
                  const cat = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[5];
                  const taskIcon = getTaskIcon(task);
                  const done = isTaskDone(task.id, player.id);
                  const doneToday = isTaskDoneToday(task.id, player.id);
                  const progress = getTaskProgress(task.id, player.id);
                  const pct = Math.min(100, (progress.current / progress.goal) * 100);

                  return (
                    <button
                      key={task.id}
                      onClick={() => {
                        if (doneToday || done) onTaskAction(task.id, player.id);
                        else onComplete(task.id, player.id);
                      }}
                      onContextMenu={e => { e.preventDefault(); onTaskAction(task.id, player.id); }}
                      className="task-icon-btn relative w-full flex items-center gap-2.5 px-3 py-2 rounded-xl cursor-pointer text-left"
                      style={{
                        background: doneToday
                          ? `linear-gradient(90deg, ${player.color}25, ${player.color}08)`
                          : `linear-gradient(90deg, ${cat.color}15, transparent)`,
                        border: `1.5px solid ${doneToday ? player.color + 'aa' : cat.color + '50'}`,
                        boxShadow: doneToday ? `0 0 8px ${player.color}30` : 'none',
                      }}
                    >
                      {/* Emoji da tarefa */}
                      <span className="text-xl flex-shrink-0 leading-none"
                        style={{ filter: doneToday ? `drop-shadow(0 0 6px ${player.color})` : 'none' }}>
                        {taskIcon}
                      </span>

                      {/* Nome */}
                      <span className="flex-1 min-w-0 text-xs font-bold truncate"
                        style={{ color: doneToday ? player.color : 'rgba(255,255,255,0.85)' }}>
                        {task.name}
                      </span>

                      {/* Progresso ou check */}
                      {doneToday ? (
                        <div className="flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center"
                          style={{ background: player.color }}>
                          <Check size={10} className="text-black" strokeWidth={3} />
                        </div>
                      ) : progress.goal > 1 ? (
                        <span className="flex-shrink-0 text-[10px] font-bold"
                          style={{ color: cat.color }}>
                          {progress.current}/{progress.goal}
                        </span>
                      ) : null}

                      {/* Barra de progresso para meta > 1 */}
                      {!doneToday && progress.goal > 1 && (
                        <div className="absolute bottom-0 left-0 right-0 h-0.5 rounded-b-xl overflow-hidden bg-black/20">
                          <div className="h-full" style={{ width: `${pct}%`, background: cat.color }} />
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ============== HOME DETAILED (a antiga, com cards maiores) ==============
function DetailedHomeView({ players, tasks, getPoints, getStreak, getTaskProgress, isTaskDone, isTaskDoneToday, onComplete, onTaskAction, getBadges, getTasksForPlayer, getPointsForPlayer, completions, currentUser }) {
  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 sm:gap-4 md:gap-5">
      {[...players].sort((a, b) => {
          if (currentUser) {
            if (a.id === currentUser.id) return -1;
            if (b.id === currentUser.id) return 1;
          }
          return 0;
        }).map(player => (
        <PlayerCardDetailed key={player.id} player={player} tasks={getTasksForPlayer(player.id)}
          getPoints={getPoints} getStreak={getStreak} getTaskProgress={getTaskProgress}
          isTaskDone={isTaskDone} isTaskDoneToday={isTaskDoneToday} onComplete={onComplete}
          onTaskAction={onTaskAction} getBadges={getBadges}
          getPointsForPlayer={getPointsForPlayer} completions={completions}
          isCurrentUser={currentUser && player.id === currentUser.id} />
      ))}
    </div>
  );
}

function PlayerCardDetailed({ player, tasks, getPoints, getStreak, getTaskProgress, isTaskDone, isTaskDoneToday, onComplete, onTaskAction, getBadges, getPointsForPlayer, completions, isCurrentUser }) {
  const monthPts = getPoints(player.id, 'month');
  const dayPts = getPoints(player.id, 'day');
  const streak = getStreak(player.id);
  const badges = getBadges(player.id);

  const byFreq = {
    daily:    tasks.filter(t => t.frequency === 'daily'),
    weekdays: tasks.filter(t => t.frequency === 'weekdays'),
    weekend:  tasks.filter(t => t.frequency === 'weekend'),
    weekly:   tasks.filter(t => t.frequency === 'weekly'),
    monthly:  tasks.filter(t => t.frequency === 'monthly'),
  };
  // Tarefas ativas hoje (weekdays e weekend dependem do dia)
  const todayInactive = new Set(
    tasks.filter(t => !isFrequencyActiveToday(t.frequency)).map(t => t.id)
  );

  const totalTasks = tasks.length;
  const doneTasks = tasks.filter(t => isTaskDone(t.id, player.id)).length;

  return (
    <div className="relative bg-black/50 backdrop-blur-sm border-2 rounded-2xl sm:rounded-3xl p-3 sm:p-4 md:p-5 flex flex-col"
      style={{
        borderColor: isCurrentUser ? player.color + 'dd' : player.color + '50',
        boxShadow: isCurrentUser ? `0 0 40px ${player.color}60` : `0 0 15px ${player.color}20`,
        background: isCurrentUser ? `linear-gradient(135deg, ${player.color}15, rgba(0,0,0,0.7))` : undefined,
      }}>
      {isCurrentUser && (
        <div className="absolute -top-3 left-4 z-10">
          <span className="bungee text-[10px] px-2.5 py-0.5 rounded-full" style={{ background: player.color, color: 'black' }}>
            VOCÊ
          </span>
        </div>
      )}
      <div className="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4 pb-3 sm:pb-4 border-b border-white/5">
        <div className="text-4xl sm:text-5xl flex-shrink-0" style={{ filter: `drop-shadow(0 0 15px ${player.color})` }}>
          {player.emoji}
        </div>
        <div className="flex-1 min-w-0">
          <div className="bungee text-base sm:text-xl text-white truncate">{player.name}</div>
          <div className="flex items-center gap-2 sm:gap-3 mt-1 flex-wrap">
            <span className="bungee text-xl sm:text-2xl neon-text" style={{ color: player.color }}>{monthPts}</span>
            <span className="text-[10px] sm:text-xs text-white/50 uppercase tracking-widest">pts/mês</span>
            {dayPts > 0 && <span className="text-[10px] sm:text-xs text-green-400 font-bold">+{dayPts} hoje</span>}
          </div>
        </div>
        <div className="flex flex-col items-end gap-1 flex-shrink-0">
          {streak > 0 && (
            <div className="flex items-center gap-1 bg-orange-500/20 text-orange-300 px-2 py-1 rounded-full text-[10px] sm:text-xs font-bold">
              <Flame size={11} />{streak}
            </div>
          )}
          {totalTasks > 0 && (
            <div className="text-[10px] sm:text-xs text-white/60">{doneTasks}/{totalTasks}</div>
          )}
        </div>
      </div>

      {badges.length > 0 && (
        <div className="flex gap-1 mb-3 sm:mb-4 flex-wrap">
          {badges.slice(-5).map(b => (
            <span key={b.id} title={b.name} className="text-base sm:text-lg">{b.icon}</span>
          ))}
          {badges.length > 5 && <span className="text-[10px] sm:text-xs text-white/50 self-center">+{badges.length - 5}</span>}
        </div>
      )}

      {/* TASK LIST — linhas claras com emoji + nome + pts + progresso */}
      <div className="space-y-2 flex-1">
        {totalTasks === 0 && (
          <div className="text-center py-8 text-white/40 text-sm italic">Nenhuma tarefa atribuída</div>
        )}
        {Object.entries(byFreq).map(([freqId, list]) => {
          if (list.length === 0) return null;
          const freq = FREQUENCIES.find(f => f.id === freqId);
          const inactive = list.filter(t => todayInactive.has(t.id));
          const active = list.filter(t => !todayInactive.has(t.id));
          return (
            <div key={freqId}>
              {/* Label da frequência */}
              <div className="flex items-center gap-2 mb-1.5">
                <div className="text-[9px] uppercase tracking-widest text-white/30 font-bold">{freq.name}</div>
                <div className="flex-1 h-px bg-white/5" />
              </div>
              <div className="space-y-1.5">
                {active.map(task => {
                  const cat = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[5];
                  const taskIcon = getTaskIcon(task);
                  const done = isTaskDone(task.id, player.id);
                  const doneToday = isTaskDoneToday(task.id, player.id);
                  const progress = getTaskProgress(task.id, player.id);
                  const pct = Math.min(100, (progress.current / progress.goal) * 100);
                  const pts = getPointsForPlayer(task, player.id);

                  return (
                    <button
                      key={task.id}
                      onClick={() => {
                        if (doneToday || done) onTaskAction(task.id, player.id);
                        else onComplete(task.id, player.id);
                      }}
                      onContextMenu={e => { e.preventDefault(); onTaskAction(task.id, player.id); }}
                      className="task-icon-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer relative overflow-hidden"
                      style={{
                        background: doneToday
                          ? `linear-gradient(90deg, ${player.color}20, ${player.color}08)`
                          : `linear-gradient(90deg, ${cat.color}12, transparent)`,
                        border: `1.5px solid ${doneToday ? player.color + '80' : cat.color + '40'}`,
                      }}
                    >
                      {/* Emoji grande */}
                      <span className="text-2xl flex-shrink-0 leading-none"
                        style={{ filter: doneToday ? `drop-shadow(0 0 8px ${player.color})` : 'none' }}>
                        {taskIcon}
                      </span>

                      {/* Nome + pontos */}
                      <div className="flex-1 min-w-0 text-left">
                        <div className="text-sm font-bold truncate"
                          style={{ color: doneToday ? player.color : 'rgba(255,255,255,0.9)' }}>
                          {task.name}
                        </div>
                        <div className="flex items-center gap-1.5 mt-0.5">
                          <span className="text-[10px] font-bold" style={{ color: cat.color }}>{cat.name}</span>
                          <span className="text-[10px] text-white/30">·</span>
                          <span className="text-[10px] text-yellow-300 font-bold">+{pts} pts</span>
                          {progress.goal > 1 && (
                            <>
                              <span className="text-[10px] text-white/30">·</span>
                              <span className="text-[10px] text-white/50">{progress.current}/{progress.goal}</span>
                            </>
                          )}
                        </div>
                        {/* Barra de progresso fina */}
                        {progress.goal > 1 && (
                          <div className="h-0.5 rounded-full bg-white/10 mt-1.5 overflow-hidden">
                            <div className="h-full rounded-full transition-all"
                              style={{ width: `${pct}%`, background: doneToday ? player.color : cat.color }} />
                          </div>
                        )}
                      </div>

                      {/* Estado: check ou seta */}
                      <div className="flex-shrink-0">
                        {doneToday ? (
                          <div className="w-7 h-7 rounded-full flex items-center justify-center"
                            style={{ background: player.color, boxShadow: `0 0 10px ${player.color}80` }}>
                            <Check size={14} className="text-black" strokeWidth={3} />
                          </div>
                        ) : (
                          <div className="w-7 h-7 rounded-full border-2 flex items-center justify-center"
                            style={{ borderColor: cat.color + '60' }}>
                            <span className="text-[10px]" style={{ color: cat.color }}>+</span>
                          </div>
                        )}
                      </div>
                    </button>
                  );
                })}
                {/* Tarefas inativas (cinza, menor) */}
                {inactive.map(task => {
                  const taskIcon = getTaskIcon(task);
                  return (
                    <div key={task.id}
                      className="flex items-center gap-3 px-3 py-2 rounded-xl opacity-25"
                      style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.05)' }}>
                      <span className="text-xl flex-shrink-0">{taskIcon}</span>
                      <span className="text-xs text-white/60 truncate flex-1">{task.name}</span>
                      <span className="text-[10px] text-white/30 flex-shrink-0">Não é hoje</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============== MONTH VIEW ==============
function MonthView({ players, tasks, completions }) {
  const [currentMonth, setCurrentMonth] = useState(new Date());
  const [selectedPlayer, setSelectedPlayer] = useState('all');
  const [selectedDay, setSelectedDay] = useState(null);

  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();

  const changeMonth = (delta) => {
    const d = new Date(currentMonth);
    d.setMonth(d.getMonth() + delta);
    setCurrentMonth(d);
    setSelectedDay(null);
    playSound('click');
  };

  const getDayCompletions = (day) => {
    const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    return completions.filter(c => {
      if (c.date !== key) return false;
      if (selectedPlayer !== 'all' && c.playerId !== selectedPlayer) return false;
      return true;
    });
  };

  const getDayPoints = (day) => getDayCompletions(day).reduce((s, c) => s + c.points, 0);

  const getDayHeatmap = (day) => {
    const dayComps = getDayCompletions(day);
    if (dayComps.length === 0) return null;
    const categoryColors = dayComps.map(c => {
      const task = tasks.find(t => t.id === c.taskId);
      const cat = task ? CATEGORIES.find(cat => cat.id === task.category) : null;
      return cat?.color || '#FF9100';
    });
    const dominantColor = blendColors(categoryColors);
    const intensity = Math.min(0.9, 0.2 + (dayComps.length * 0.08));
    return { color: dominantColor, intensity, count: dayComps.length };
  };

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const today = new Date();
  const isToday = (d) => d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
  const isFuture = (d) => new Date(year, month, d) > today;

  const selectedCompletions = selectedDay ? getDayCompletions(selectedDay) : [];

  let monthTotal = 0;
  let monthCount = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const comps = getDayCompletions(d);
    monthTotal += comps.reduce((s, c) => s + c.points, 0);
    monthCount += comps.length;
  }

  return (
    <div className="space-y-4 sm:space-y-6">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div className="flex items-center gap-2 sm:gap-3">
          <button onClick={() => changeMonth(-1)} className="bg-black/40 border border-white/10 rounded-xl p-2 hover:bg-black/60 transition-colors">
            <ChevronLeft size={18} className="text-white" />
          </button>
          <h2 className="bungee text-lg sm:text-2xl md:text-3xl text-white neon-text" style={{ color: '#FFD600' }}>
            {currentMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase()}
          </h2>
          <button onClick={() => changeMonth(1)} className="bg-black/40 border border-white/10 rounded-xl p-2 hover:bg-black/60 transition-colors">
            <ChevronRight size={18} className="text-white" />
          </button>
        </div>

        <div className="flex gap-1.5 sm:gap-2 flex-wrap">
          <button onClick={() => { setSelectedPlayer('all'); playSound('click'); }}
            className={`px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl text-[10px] sm:text-xs font-bold transition-all ${selectedPlayer === 'all' ? 'bg-white text-black' : 'bg-black/40 text-white/60 border border-white/10'}`}>
            TODOS
          </button>
          {players.map(p => (
            <button key={p.id} onClick={() => { setSelectedPlayer(p.id); playSound('click'); }}
              className={`px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-xl text-[10px] sm:text-xs font-bold transition-all flex items-center gap-1 ${selectedPlayer === p.id ? 'text-black' : 'bg-black/40 text-white/60 border border-white/10'}`}
              style={selectedPlayer === p.id ? { background: p.color, boxShadow: `0 0 15px ${p.color}80` } : {}}>
              <span>{p.emoji}</span>
              <span className="hidden sm:inline">{p.name}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-3 gap-2 sm:gap-3">
        <div className="bg-black/50 border border-white/10 rounded-2xl p-3 sm:p-4">
          <div className="text-[10px] sm:text-xs text-white/50 uppercase tracking-widest mb-1">Atividades</div>
          <div className="bungee text-2xl sm:text-3xl text-white">{monthCount}</div>
        </div>
        <div className="bg-black/50 border border-white/10 rounded-2xl p-3 sm:p-4">
          <div className="text-[10px] sm:text-xs text-white/50 uppercase tracking-widest mb-1">Pontos</div>
          <div className="bungee text-2xl sm:text-3xl" style={{ color: '#FFD600' }}>{monthTotal}</div>
        </div>
        <div className="bg-black/50 border border-white/10 rounded-2xl p-3 sm:p-4 col-span-2 md:col-span-1">
          <div className="text-[10px] sm:text-xs text-white/50 uppercase tracking-widest mb-1">Filtro</div>
          <div className="bungee text-base sm:text-lg text-white truncate">
            {selectedPlayer === 'all' ? 'Família toda' : players.find(p => p.id === selectedPlayer)?.name}
          </div>
        </div>
      </div>

      <div className="bg-black/50 backdrop-blur-sm border border-white/10 rounded-2xl sm:rounded-3xl p-2 sm:p-3 md:p-6">
        <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
          {['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'].map(d => (
            <div key={d} className="text-center text-[9px] sm:text-[10px] md:text-xs font-bold text-white/50 uppercase tracking-widest py-1 sm:py-2">{d}</div>
          ))}
        </div>

        <div className="grid grid-cols-7 gap-1 md:gap-2">
          {cells.map((day, i) => {
            if (day === null) return <div key={i} />;
            const dayComps = getDayCompletions(day);
            const dayPts = getDayPoints(day);
            const future = isFuture(day);
            const isSelected = selectedDay === day;
            const heatmap = getDayHeatmap(day);

            let bgStyle = 'rgba(0,0,0,0.3)';
            let borderColor = 'rgba(255,255,255,0.05)';
            if (heatmap) {
              const alpha = Math.round(heatmap.intensity * 255).toString(16).padStart(2, '0');
              bgStyle = `linear-gradient(135deg, ${heatmap.color}${alpha}, ${heatmap.color}${Math.round(heatmap.intensity * 0.5 * 255).toString(16).padStart(2, '0')})`;
              borderColor = heatmap.color + '80';
            }
            if (isToday(day)) borderColor = '#FFD600';

            return (
              <button
                key={i}
                onClick={() => !future && setSelectedDay(day)}
                disabled={future}
                className={`aspect-square relative rounded-lg sm:rounded-xl p-1 sm:p-2 transition-all ${
                  future ? 'opacity-30 cursor-not-allowed' : 'hover:scale-105 active:scale-95 cursor-pointer'
                } ${isSelected ? 'ring-2 ring-yellow-400' : ''}`}
                style={{
                  background: bgStyle,
                  border: `${isToday(day) ? 2 : 1}px solid ${borderColor}`,
                  boxShadow: heatmap ? `0 0 ${heatmap.intensity * 15}px ${heatmap.color}40` : 'none',
                }}
              >
                <div className={`text-[10px] sm:text-xs md:text-sm font-bold mb-0.5 ${isToday(day) ? 'text-yellow-300' : 'text-white/90'}`}>
                  {day}
                </div>
                {dayComps.length > 0 && (
                  <div className="flex flex-wrap gap-0.5 justify-center items-center leading-none">
                    {dayComps.slice(0, 6).map((c, idx) => {
                      const task = tasks.find(t => t.id === c.taskId);
                      const cat = task ? CATEGORIES.find(cat => cat.id === task.category) : null;
                      return (
                        <span key={idx} className="text-[9px] sm:text-xs md:text-sm leading-none" title={task?.name}>
                          {task ? getTaskIcon(task) : '⭐'}
                        </span>
                      );
                    })}
                    {dayComps.length > 6 && (
                      <span className="text-[7px] sm:text-[8px] text-white/70 font-bold">+{dayComps.length - 6}</span>
                    )}
                  </div>
                )}
                {dayPts > 0 && (
                  <div className="absolute bottom-0.5 right-1 text-[7px] sm:text-[8px] md:text-[10px] font-bold text-yellow-300">{dayPts}</div>
                )}
              </button>
            );
          })}
        </div>

        <div className="mt-4 sm:mt-6 pt-4 border-t border-white/5">
          <div className="text-[10px] uppercase tracking-widest text-white/40 mb-2 font-bold">Categorias</div>
          <div className="flex flex-wrap gap-2">
            {CATEGORIES.map(cat => (
              <div key={cat.id} className="flex items-center gap-1.5 bg-black/30 border rounded-lg px-2 py-1" style={{ borderColor: cat.color + '40' }}>
                <span className="text-sm">{cat.icon}</span>
                <span className="text-[10px] text-white/70 font-bold">{cat.name}</span>
                <div className="w-2 h-2 rounded-full" style={{ background: cat.color }} />
              </div>
            ))}
          </div>
          <div className="text-[10px] text-white/40 mt-2 italic">A cor segue a categoria predominante; mais brilhante = mais atividades</div>
        </div>
      </div>

      {selectedDay && (
        <div className="bg-black/50 backdrop-blur-sm border border-white/10 rounded-2xl sm:rounded-3xl p-4 sm:p-6">
          <div className="flex items-center justify-between mb-4 gap-2">
            <h3 className="bungee text-base sm:text-xl text-white">
              DIA {selectedDay} · {selectedCompletions.length} ativ. · {selectedCompletions.reduce((s, c) => s + c.points, 0)} pts
            </h3>
            <button onClick={() => setSelectedDay(null)} className="text-white/50 hover:text-white flex-shrink-0">
              <X size={20} />
            </button>
          </div>
          {selectedCompletions.length === 0 ? (
            <div className="text-white/40 italic text-center py-4">Nenhuma atividade neste dia</div>
          ) : (
            <div className="space-y-3">
              {players.filter(p => selectedPlayer === 'all' || p.id === selectedPlayer).map(player => {
                const playerComps = selectedCompletions.filter(c => c.playerId === player.id);
                if (playerComps.length === 0) return null;
                const playerPts = playerComps.reduce((s, c) => s + c.points, 0);
                return (
                  <div key={player.id} className="bg-white/5 rounded-xl p-3">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-xl">{player.emoji}</span>
                      <span className="bungee text-sm text-white">{player.name}</span>
                      <span className="text-xs bungee ml-auto" style={{ color: player.color }}>+{playerPts}</span>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {playerComps.map((c, idx) => {
                        const task = tasks.find(t => t.id === c.taskId);
                        const cat = task ? CATEGORIES.find(cat => cat.id === task.category) : null;
                        return (
                          <div key={idx} className="flex items-center gap-1.5 bg-black/40 rounded-lg px-2 py-1 border border-white/10">
                            <span>{cat?.icon || '⭐'}</span>
                            <span className="text-xs text-white/80">{task?.name || 'Tarefa removida'}</span>
                            <span className="text-[10px] text-yellow-300 font-bold">+{c.points}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============== RANKING VIEW ==============
function RankingView({ players, completions, getStreak, getBadges, getPoints }) {
  const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣'];
  const [period, setPeriod] = useState('month');
  const rankingByPeriod = [...players].map(p => ({ ...p, points: getPoints(p.id, period) })).sort((a, b) => b.points - a.points);
  const maxPoints = Math.max(...rankingByPeriod.map(r => r.points), 1);

  const history = {};
  players.forEach(p => {
    history[p.id] = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      const pts = completions.filter(c => c.playerId === p.id && c.date === key).reduce((s, c) => s + c.points, 0);
      history[p.id].push({ date: key, points: pts });
    }
  });

  return (
    <div className="space-y-6 sm:space-y-8">
      <div className="flex gap-2 justify-center">
        {[{ id: 'day', label: 'Hoje' }, { id: 'week', label: 'Semana' }, { id: 'month', label: 'Mês' }].map(p => (
          <button key={p.id} onClick={() => { setPeriod(p.id); playSound('click'); }}
            className={`px-4 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-xs sm:text-sm transition-all ${period === p.id ? 'text-black' : 'text-white/60 bg-black/40 border border-white/10'}`}
            style={period === p.id ? { background: 'linear-gradient(135deg, #FFD600, #FF3D9A)' } : {}}>
            {p.label}
          </button>
        ))}
      </div>

      <div className="bg-black/50 backdrop-blur-sm border border-white/10 rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8">
        <h2 className="bungee text-xl sm:text-2xl md:text-3xl text-center text-white mb-6 sm:mb-8 neon-text" style={{ color: '#FFD600' }}>
          🏆 RANKING {period === 'day' ? 'DO DIA' : period === 'week' ? 'DA SEMANA' : 'DO MÊS'}
        </h2>
        <div className="space-y-3 sm:space-y-4">
          {rankingByPeriod.map((player, idx) => (
            <div key={player.id} className="flex items-center gap-2 sm:gap-4 p-3 sm:p-4 rounded-xl sm:rounded-2xl"
              style={{ background: `linear-gradient(90deg, ${player.color}20 0%, transparent 100%)`, border: `2px solid ${player.color}40` }}>
              <div className="text-2xl sm:text-3xl md:text-4xl w-8 sm:w-10 md:w-14 text-center flex-shrink-0">{medals[idx] || `#${idx + 1}`}</div>
              <div className="text-3xl sm:text-4xl md:text-5xl flex-shrink-0" style={{ filter: `drop-shadow(0 0 10px ${player.color})` }}>{player.emoji}</div>
              <div className="flex-1 min-w-0">
                <div className="bungee text-base sm:text-lg md:text-xl text-white truncate">{player.name}</div>
                <div className="h-2 sm:h-3 rounded-full bg-white/5 overflow-hidden mt-2">
                  <div className="h-full rounded-full transition-all duration-1000"
                    style={{ width: `${(player.points / maxPoints) * 100}%`, background: `linear-gradient(90deg, ${player.color}, ${player.color}99)`, boxShadow: `0 0 10px ${player.color}` }} />
                </div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className="bungee text-xl sm:text-2xl md:text-3xl neon-text" style={{ color: player.color }}>{player.points}</div>
                <div className="text-[9px] sm:text-[10px] text-white/50 uppercase tracking-widest">pontos</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-black/50 backdrop-blur-sm border border-white/10 rounded-2xl sm:rounded-3xl p-4 sm:p-6">
        <h3 className="bungee text-base sm:text-xl text-white mb-4 sm:mb-6 flex items-center gap-2">
          <BarChart3 size={20} />
          EVOLUÇÃO - 14 DIAS
        </h3>
        <div className="overflow-x-auto scrollbar-custom">
          <svg viewBox="0 0 700 250" className="w-full" style={{ minWidth: '500px' }}>
            {[0, 25, 50, 75, 100].map(y => (
              <line key={y} x1="40" x2="690" y1={220 - y * 1.8} y2={220 - y * 1.8} stroke="rgba(255,255,255,0.05)" />
            ))}
            {players[0] && history[players[0].id].map((h, i) => {
              const x = 40 + (i * (650 / 13));
              const d = new Date(h.date);
              return (
                <text key={i} x={x} y={240} fill="rgba(255,255,255,0.4)" fontSize="10" textAnchor="middle">
                  {d.getDate()}/{d.getMonth() + 1}
                </text>
              );
            })}
            {players.map(player => {
              const pts = history[player.id];
              const max = Math.max(...Object.values(history).flat().map(h => h.points), 10);
              const path = pts.map((h, i) => {
                const x = 40 + (i * (650 / 13));
                const y = 220 - (h.points / max) * 180;
                return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
              }).join(' ');
              return (
                <g key={player.id}>
                  <path d={path} fill="none" stroke={player.color} strokeWidth="2.5" opacity="0.8" style={{ filter: `drop-shadow(0 0 4px ${player.color})` }} />
                  {pts.map((h, i) => {
                    const x = 40 + (i * (650 / 13));
                    const y = 220 - (h.points / max) * 180;
                    return <circle key={i} cx={x} cy={y} r="3" fill={player.color} />;

      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
        {players.map(player => {
          const badges = getBadges(player.id);
          const streak = getStreak(player.id);
          const totalTasks = completions.filter(c => c.playerId === player.id).length;
          return (
            <div key={player.id} className="bg-black/50 backdrop-blur-sm border-2 rounded-2xl p-4 sm:p-5" style={{ borderColor: player.color + '60' }}>
              <div className="flex items-center gap-3 mb-4">
                <div className="text-3xl sm:text-4xl flex-shrink-0" style={{ filter: `drop-shadow(0 0 10px ${player.color})` }}>{player.emoji}</div>
                <div className="min-w-0">
                  <div className="bungee text-base sm:text-xl text-white truncate">{player.name}</div>
                  <div className="text-[10px] sm:text-xs text-white/50">{totalTasks} tarefas no total</div>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 mb-4">
                <Stat label="Mês" value={getPoints(player.id, 'month')} color={player.color} />
                <Stat label="Semana" value={getPoints(player.id, 'week')} color={player.color} />
                <Stat label="Streak" value={streak + '🔥'} color={player.color} />
              </div>
              <div>
                <div className="text-[10px] sm:text-xs uppercase tracking-widest text-white/50 mb-2">Conquistas ({badges.length})</div>

                  <div className="text-white/30 text-xs sm:text-sm italic">Ainda nenhuma. Vamos lá!</div>
                ) : (
                  <div className="flex flex-wrap gap-2">
                    {badges.map(b => (
                      <div key={b.id} className="bg-white/5 border border-white/10 rounded-lg px-2 py-1 flex items-center gap-1">
                        <span>{b.icon}</span>
                        <span className="text-[10px] sm:text-xs text-white/70">{b.name}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                    <span>·</span>
                    <span>{freq.name}</span>
                    {!hasCustomPerPlayer && (
                      <>
                        <span>·</span>
                        <span>meta {task.goal}x {FREQUENCIES.find(f => f.id === task.frequency)?.short || ""}</span>
